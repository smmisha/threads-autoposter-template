name: Daily Threads Auto-Publisher

on:
  schedule:
    # Runs every day at 09:00 UTC (12:00 Moscow Time)
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Publish Script
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: node publish.js

      - name: Commit and Push Changes (Update posts.json status)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          # Commit only if there are changes to posts.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update posts.json with publishing status [skip ci]" && git push)
